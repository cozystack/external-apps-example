##
## @section Server configuration
##

## @enum {string} UpdateStrategy - Update strategy for the Paper server version.
## @value latest
## @value auto
## @value pin
## @value build-pin

## @param {UpdateStrategy} updateStrategy="latest" - Update strategy for the Paper server version.
updateStrategy: latest

## @param {string} version="" - Target Minecraft version. The operator requires it for the pin and build-pin strategies.
version: ""

## @param {quantity} memoryLimit="2Gi" - Memory limit for the server container.
memoryLimit: 2Gi

## @param {quantity} cpuLimit="2000m" - CPU limit for the server container.
cpuLimit: "2000m"

##
## @section Service configuration
##

## @enum {string} ServiceType - Kubernetes Service type used to expose the server.
## @value LoadBalancer
## @value NodePort
## @value ClusterIP

## @param {ServiceType} serviceType="LoadBalancer" - Service type used to expose the server.
serviceType: LoadBalancer

##
## @section Backup configuration
##

## @param {bool} backupEnabled=false - Enable VolumeSnapshot-based backups.
backupEnabled: false

## @param {string} backupSchedule="0 */6 * * *" - Cron schedule for periodic backups.
backupSchedule: "0 */6 * * *"

## @param {int} backupRetention=10 - Maximum number of backup snapshots to keep.
## @minimum 1
backupRetention: 10

##
## @section Update schedule
##

## @param {string} checkCron="0 */4 * * *" - Cron schedule for checking for Paper updates.
checkCron: "0 */4 * * *"
