##
## @section Plugin source
##

## @enum {string} SourceType - Where the plugin JAR comes from.
## @value hangar
## @value url

## @param {SourceType} sourceType="hangar" - Plugin source type.
sourceType: hangar

## @param {string} project="" - Plugin project identifier on Hangar (e.g. BlueMap). The operator requires it when sourceType is hangar.
project: ""

## @param {string} url="" - Direct download URL of the plugin JAR. The operator requires it when sourceType is url.
url: ""

## @param {string} checksum="" - Optional SHA-256 checksum (64 hex characters) of the JAR file, used with sourceType url.
checksum: ""

##
## @section Version management
##

## @enum {string} UpdateStrategy - Update strategy for the plugin version.
## @value latest
## @value auto
## @value pin
## @value build-pin

## @param {UpdateStrategy} updateStrategy="latest" - Update strategy for the plugin version.
updateStrategy: latest

## @param {string} version="" - Target plugin version. The operator requires it for the pin and build-pin strategies.
version: ""

##
## @section Server binding
##

## @typedef {struct} InstanceSelector - Label selector matching PaperMCServer resources in the same namespace.
## @field {map[string]string} [matchLabels] - Labels a PaperMCServer must carry to be selected. An empty selector matches every server in the namespace.

## @param {InstanceSelector} instanceSelector - Selector for the servers this plugin is installed on. The label value to match is the Helm release name of the server app, `minecraft-server-<name>`.
instanceSelector: {}

##
## @section Network endpoints
##

## @enum {string} EndpointProtocol - Protocol of an exposed endpoint.
## @value TCP
## @value UDP
## @value HTTP

## @typedef {struct} Endpoint - Network endpoint exposed by the plugin.
## @field {string} name - Endpoint name (DNS label).
## @field {int} port - Port number.
## @minimum 1
## @maximum 65535
## @field {EndpointProtocol} [protocol]="TCP" - Endpoint protocol.

## @param {[]Endpoint} endpoints - Network endpoints exposed by this plugin.
endpoints: []
