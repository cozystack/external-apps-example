---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minecraft-operator
  namespace: external-minecraft-operator
spec:
  interval: 5m
  releaseName: minecraft-operator
  targetNamespace: external-minecraft-operator
  chart:
    spec:
      chart: minecraft-operator
      sourceRef:
        kind: HelmRepository
        name: minecraft-operator
      version: '>=1.0.0'
  values:
    crds:
      manage: true
